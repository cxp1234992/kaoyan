name: Update study results

on:
  push:
    branches:
      - main
    paths:
      - "data/**/*.md"
      - "py/**/*.py"
      - "requirements.txt"
      - ".github/workflows/update-study-results.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate Excel files and charts
        working-directory: py
        env:
          MPLBACKEND: Agg
        run: python auto_run.py

      - name: Commit generated results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated study results"
          file_pattern: "data/xlsx/*.xlsx data/pic/**/*.png"
